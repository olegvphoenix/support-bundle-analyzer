# Add these location blocks inside the existing
#   server { listen 80; server_name 89.167.61.115; ... }
# (host nginx, market-brief.conf) to publish the analyzer at http://<host>/sba/.
# Place BEFORE the catch-all `location / {}`.

# tus resumable uploads — no body limit, no request buffering.
location /sba/files/ {
    proxy_pass http://127.0.0.1:1080;
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
}

# Next.js app (basePath=/sba), incl. /sba/api/* with SSE support.
location /sba/ {
    proxy_pass http://127.0.0.1:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50m;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_set_header Connection '';
}
